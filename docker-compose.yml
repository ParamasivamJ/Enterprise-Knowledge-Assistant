# Docker Compose for Enterprise Knowledge Assistant
# Spins up Qdrant (vector DB) and PostgreSQL (relational DB)

services:
  # ──────────────────────────────────────────────
  # Qdrant - Vector Database
  # Dashboard: http://localhost:6333/dashboard
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge_qdrant
    ports:
      - "6333:6333"   # REST API + Dashboard
      - "6334:6334"   # gRPC (for high-perf clients)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # PostgreSQL - Relational Database
  # Stores: documents metadata, chat logs, eval scores
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: knowledge_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
